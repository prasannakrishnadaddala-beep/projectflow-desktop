name: Build ProjectFlow Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Assemble src-tauri structure
        shell: python
        run: |
          import shutil, textwrap
          from pathlib import Path

          for d in ["src-tauri/src","src-tauri/capabilities","src-tauri/icons","dist"]:
              Path(d).mkdir(parents=True, exist_ok=True)

          shutil.copy("lib.rs",          "src-tauri/src/lib.rs")
          shutil.copy("main.rs",         "src-tauri/src/main.rs")
          shutil.copy("build.rs",        "src-tauri/build.rs")
          shutil.copy("tauri.conf.json", "src-tauri/tauri.conf.json")
          shutil.copy("default.json",    "src-tauri/capabilities/default.json")
          shutil.copy("index.html",      "dist/index.html")

          cargo = textwrap.dedent("""
              [package]
              name = "projectflow"
              version = "4.1.0"
              description = "ProjectFlow Desktop"
              edition = "2021"

              [lib]
              name = "projectflow_lib"
              crate-type = ["staticlib", "cdylib", "rlib"]
              path = "src/lib.rs"

              [[bin]]
              name = "projectflow"
              path = "src/main.rs"

              [build-dependencies]
              tauri-build = { version = "2", features = [] }

              [dependencies]
              tauri = { version = "2", features = ["tray-icon", "image-ico", "image-png"] }
              tauri-plugin-notification = "2"
              tauri-plugin-shell = "2"
              tauri-plugin-http = "2"
              serde = { version = "1", features = ["derive"] }
              serde_json = "1"
          """).strip()

          Path("src-tauri/Cargo.toml").write_text(cargo)
          print("src-tauri ready:")
          for f in sorted(Path("src-tauri").rglob("*")):
              print(" ", f)

      - name: Generate icons
        run: |
          pip install Pillow --quiet
          python generate_icons.py

      - name: Patch Railway URL
        shell: bash
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|https://web-production-3431b.up.railway.app|${URL}|g" src-tauri/src/lib.rs
            echo "Patched: ${URL}"
          fi

      - name: Build Tauri app
        run: tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Find built files
        shell: bash
        id: find_files
        run: |
          EXE=$(find src-tauri/target -name "*setup*.exe" 2>/dev/null | head -1)
          MSI=$(find src-tauri/target -name "*.msi" 2>/dev/null | head -1)
          NSIS=$(find src-tauri/target -name "*.exe" | grep -i nsis | head -1)
          echo "Found:"
          find src-tauri/target/x86_64-pc-windows-msvc/release/bundle -type f 2>/dev/null || true
          BUNDLE_EXE=$(find src-tauri/target -path "*/bundle/*" -name "*.exe" 2>/dev/null | head -1)
          BUNDLE_MSI=$(find src-tauri/target -path "*/bundle/*" -name "*.msi" 2>/dev/null | head -1)
          echo "bundle_exe=$BUNDLE_EXE" >> $GITHUB_OUTPUT
          echo "bundle_msi=$BUNDLE_MSI" >> $GITHUB_OUTPUT
          echo "EXE: $BUNDLE_EXE"
          echo "MSI: $BUNDLE_MSI"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.1.0
          name: "ProjectFlow v4.1.0"
          body: |
            ## ProjectFlow Desktop v4.1.0
            Download **ProjectFlow_x64-setup.exe** or **.msi** below and run it.
            First launch asks for your Railway URL once — then never again.
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
