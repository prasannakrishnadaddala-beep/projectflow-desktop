# /etc/nginx/sites-available/projectflow
# Replace projectflow.example.com with your actual domain
# Then: sudo certbot --nginx -d projectflow.example.com

server {
    listen 80;
    server_name projectflow.example.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name projectflow.example.com;

    # ── SSL (managed by Certbot) ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/projectflow.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projectflow.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "same-origin"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/projectflow-access.log;
    error_log  /var/log/nginx/projectflow-error.log;

    # ── File upload limit (matches Flask config) ──────────────────────────
    client_max_body_size 155M;

    # ── Static files (served directly — fast) ─────────────────────────────
    location /pf_static/ {
        alias /opt/projectflow/data/pf_static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Uploads ───────────────────────────────────────────────────────────
    location /api/files/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Main app proxy ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_cache        off;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check endpoint ─────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000/;
        access_log off;
    }
}
