name: Build ProjectFlow Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.5.0

      - name: Generate or load signing keys
        id: signing
        shell: python
        run: |
          import subprocess, os, sys
          from pathlib import Path

          priv = os.environ.get("TAURI_SIGNING_PRIVATE_KEY", "").strip()
          pub  = os.environ.get("TAURI_SIGNING_PUBLIC_KEY",  "").strip()

          if priv and pub:
              print("Using existing signing keys from secrets")
              # Write to env for next steps
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"TAURI_KEY={priv}\n")
                  f.write(f"TAURI_PUBKEY={pub}\n")
          else:
              print("No signing keys found — generating new ones via tauri signer")
              result = subprocess.run(
                  ["tauri", "signer", "generate"],
                  input="projectflow\n",
                  capture_output=True, text=True
              )
              out = result.stdout + result.stderr
              print(out)
              # Parse keys from output
              priv_key = ""
              pub_key  = ""
              for line in out.splitlines():
                  if "Private key" in line or "private" in line.lower():
                      priv_key = line.split(":")[-1].strip()
                  if "Public key" in line or "public" in line.lower():
                      pub_key = line.split(":")[-1].strip()
              if priv_key:
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write(f"TAURI_KEY={priv_key}\n")
                      f.write(f"TAURI_PUBKEY={pub_key}\n")
                  print(f"Generated keys. Add to repo secrets:\nTAURI_SIGNING_PRIVATE_KEY={priv_key}\nTAURI_SIGNING_PUBLIC_KEY={pub_key}")
              else:
                  print("Could not parse keys — updater signing disabled")
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write("TAURI_KEY=\nTAURI_PUBKEY=\n")
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build project structure
        shell: python
        run: |
          import shutil, textwrap, json, os
          from pathlib import Path

          for d in ["src-tauri/src", "src-tauri/capabilities", "src-tauri/icons", "dist"]:
              Path(d).mkdir(parents=True, exist_ok=True)

          copies = {
              "lib.rs":       "src-tauri/src/lib.rs",
              "main.rs":      "src-tauri/src/main.rs",
              "build.rs":     "src-tauri/build.rs",
              "default.json": "src-tauri/capabilities/default.json",
              "index.html":   "dist/index.html",
          }
          for src, dst in copies.items():
              if Path(src).exists():
                  shutil.copy(src, dst)

          pub_key = os.environ.get("TAURI_PUBKEY", "").strip()

          tauri_conf = {
            "$schema": "https://schema.tauri.app/config/2",
            "productName": "ProjectFlow",
            "version": "4.1.0",
            "identifier": "com.projectflow.app",
            "build": { "frontendDist": "../dist" },
            "app": {
              "windows": [],
              "security": { "csp": None, "dangerousDisableAssetCspModification": True },
              "withGlobalTauri": True
            },
            "bundle": {
              "active": True,
              "targets": "all",
              "icon": ["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"],
              "publisher": "FSBL",
              "category": "Productivity",
              "createUpdaterArtifacts": True
            },
            "plugins": {
              "updater": {
                "active": True,
                "pubkey": pub_key,
                "endpoints": [
                  "https://github.com/prasannakrishnadaddala-beep/projectflow-desktop/releases/latest/download/latest.json"
                ],
                "dialog": True,
                "installMode": "passive"
              }
            }
          }
          Path("src-tauri/tauri.conf.json").write_text(json.dumps(tauri_conf, indent=2))

          cargo = textwrap.dedent("""
              [package]
              name = "projectflow"
              version = "4.1.0"
              description = "ProjectFlow Desktop"
              edition = "2021"

              [lib]
              name = "projectflow_lib"
              crate-type = ["staticlib", "cdylib", "rlib"]
              path = "src/lib.rs"

              [[bin]]
              name = "projectflow"
              path = "src/main.rs"

              [build-dependencies]
              tauri-build = { version = "2", features = [] }

              [dependencies]
              tauri = { version = "2", features = ["tray-icon", "image-ico", "image-png"] }
              tauri-plugin-notification = "2"
              tauri-plugin-shell = "2"
              tauri-plugin-http = "2"
              tauri-plugin-updater = "2"
              tauri-plugin-process = "2"
              serde = { version = "1", features = ["derive"] }
              serde_json = "1"
          """).strip()
          Path("src-tauri/Cargo.toml").write_text(cargo)
          Path("Cargo.toml").write_text('[workspace]\nmembers = ["src-tauri"]\nresolver = "2"\n')
          print("Structure ready")

      - name: Generate icons from icon.png
        run: |
          pip install Pillow --quiet
          python generate_icons.py

      - name: Patch Railway URL
        shell: bash
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|https://web-production-bde95.up.railway.app|${URL}|g" src-tauri/src/lib.rs
          fi

      - name: Build Tauri app
        working-directory: src-tauri
        run: tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectFlow-Windows
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ProjectFlow_4.1.0_x64-setup.exe
            target/x86_64-pc-windows-msvc/release/bundle/msi/ProjectFlow_4.1.0_x64_en-US.msi
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.1.0
          name: "ProjectFlow v4.1.0"
          body: |
            ## ProjectFlow Desktop v4.1.0
            Download and install once — future updates happen automatically inside the app.
          files: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/ProjectFlow_4.1.0_x64-setup.exe
            target/x86_64-pc-windows-msvc/release/bundle/msi/ProjectFlow_4.1.0_x64_en-US.msi
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
