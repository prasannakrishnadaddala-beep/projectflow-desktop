name: Build ProjectFlow Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .msi
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate icons from icon.png
        run: |
          pip install Pillow --quiet
          python generate_icons.py

      - name: Patch Railway URL
        shell: bash
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|https://web-production-3431b.up.railway.app|${URL}|g" src-tauri/src/lib.rs
            echo "Patched: ${URL}"
          fi

      - name: Install npm deps
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tagName: v__VERSION__
          releaseName: "ProjectFlow v__VERSION__"
          releaseBody: |
            ## ProjectFlow Desktop v__VERSION__
            Download **ProjectFlow_x64_en-US.msi** and run it.
            First launch asks for your Railway URL once — then never again.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
