name: Build ProjectFlow Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove root Cargo.toml so Tauri finds src-tauri only
        shell: bash
        run: rm -f Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Assemble src-tauri structure
        shell: python
        run: |
          import shutil, textwrap
          from pathlib import Path

          for d in ["src-tauri/src","src-tauri/capabilities","src-tauri/icons","dist"]:
              Path(d).mkdir(parents=True, exist_ok=True)

          shutil.copy("lib.rs",          "src-tauri/src/lib.rs")
          shutil.copy("main.rs",         "src-tauri/src/main.rs")
          shutil.copy("build.rs",        "src-tauri/build.rs")
          shutil.copy("tauri.conf.json", "src-tauri/tauri.conf.json")
          shutil.copy("default.json",    "src-tauri/capabilities/default.json")
          shutil.copy("index.html",      "dist/index.html")

          cargo = textwrap.dedent("""
              [package]
              name = "projectflow"
              version = "4.1.0"
              description = "ProjectFlow Desktop"
              edition = "2021"

              [lib]
              name = "projectflow_lib"
              crate-type = ["staticlib", "cdylib", "rlib"]
              path = "src/lib.rs"

              [[bin]]
              name = "projectflow"
              path = "src/main.rs"

              [build-dependencies]
              tauri-build = { version = "2", features = [] }

              [dependencies]
              tauri = { version = "2", features = ["tray-icon", "image-ico", "image-png"] }
              tauri-plugin-notification = "2"
              tauri-plugin-shell = "2"
              tauri-plugin-http = "2"
              serde = { version = "1", features = ["derive"] }
              serde_json = "1"
          """).strip()

          Path("src-tauri/Cargo.toml").write_text(cargo)
          print("Files in src-tauri:")
          for f in sorted(Path("src-tauri").rglob("*")):
              print(" ", f)

      - name: Generate icons
        run: |
          pip install Pillow --quiet
          python generate_icons.py

      - name: Patch Railway URL
        shell: bash
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|https://web-production-3431b.up.railway.app|${URL}|g" src-tauri/src/lib.rs
            echo "Patched: ${URL}"
          fi

      - name: Install npm deps
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "ProjectFlow v__VERSION__"
          releaseBody: |
            ## ProjectFlow Desktop v__VERSION__
            Download **ProjectFlow_x64-setup.exe** and run it.
            First launch asks for your Railway URL once — then never again.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
