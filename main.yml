name: Build ProjectFlow — All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# ── Shared setup script used by all jobs ──────────────────────────────────────
# Each job copies it inline (GitHub Actions doesn't support YAML anchors)

jobs:

# ══════════════════════════════════════════════════════════════
#  WINDOWS
# ══════════════════════════════════════════════════════════════
  build-windows:
    name: Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.5.0
      - name: Assemble src-tauri
        shell: python
        run: |
          import shutil, textwrap, json
          from pathlib import Path
          for d in ["src-tauri/src","src-tauri/capabilities","src-tauri/icons","dist"]:
              Path(d).mkdir(parents=True, exist_ok=True)
          for s,d in {"lib.rs":"src-tauri/src/lib.rs","main.rs":"src-tauri/src/main.rs",
              "build.rs":"src-tauri/build.rs","default.json":"src-tauri/capabilities/default.json",
              "index.html":"dist/index.html"}.items():
              if Path(s).exists(): shutil.copy(s,d)
          Path("src-tauri/tauri.conf.json").write_text(json.dumps({
            "$schema":"https://schema.tauri.app/config/2","productName":"ProjectFlow",
            "version":"4.1.0","identifier":"com.projectflow.app",
            "build":{"frontendDist":"../dist"},
            "app":{"windows":[],"security":{"csp":None,"dangerousDisableAssetCspModification":True},"withGlobalTauri":True},
            "bundle":{"active":True,"targets":"all","publisher":"FSBL","category":"Productivity",
              "icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"]}
          },indent=2))
          Path("src-tauri/Cargo.toml").write_text(textwrap.dedent("""
              [package]
              name = "projectflow"
              version = "4.1.0"
              edition = "2021"
              [lib]
              name = "projectflow_lib"
              crate-type = ["staticlib","cdylib","rlib"]
              path = "src/lib.rs"
              [[bin]]
              name = "projectflow"
              path = "src/main.rs"
              [build-dependencies]
              tauri-build = { version = "2", features = [] }
              [dependencies]
              tauri = { version = "2", features = ["tray-icon","image-ico","image-png"] }
              tauri-plugin-notification = "2"
              tauri-plugin-shell = "2"
              tauri-plugin-http = "2"
              serde = { version = "1", features = ["derive"] }
              serde_json = "1"
          """).strip())
          Path("Cargo.toml").write_text('[workspace]\nmembers=["src-tauri"]\nresolver="2"\n')
      - name: Generate icons
        run: pip install Pillow --quiet && python generate_icons.py
      - name: Patch URL
        shell: bash
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          [ -n "$URL" ] && sed -i "s|https://web-production-bde95.up.railway.app|${URL}|g" src-tauri/src/lib.rs || true
      - name: Build
        working-directory: src-tauri
        run: tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

# ══════════════════════════════════════════════════════════════
#  ANDROID
# ══════════════════════════════════════════════════════════════
  build-android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.5.0
      - name: Assemble src-tauri
        run: |
          python3 -c "
          import shutil, textwrap, json
          from pathlib import Path
          for d in ['src-tauri/src','src-tauri/capabilities','src-tauri/icons','dist']:
              Path(d).mkdir(parents=True, exist_ok=True)
          for s,d in {'lib.rs':'src-tauri/src/lib.rs','main.rs':'src-tauri/src/main.rs',
              'build.rs':'src-tauri/build.rs','default.json':'src-tauri/capabilities/default.json',
              'index.html':'dist/index.html'}.items():
              Path(s).exists() and shutil.copy(s,d)
          Path('src-tauri/tauri.conf.json').write_text(json.dumps({
            '\$schema':'https://schema.tauri.app/config/2','productName':'ProjectFlow',
            'version':'4.1.0','identifier':'com.projectflow.app',
            'build':{'frontendDist':'../dist'},
            'app':{'windows':[],'security':{'csp':None,'dangerousDisableAssetCspModification':True},'withGlobalTauri':True},
            'bundle':{'active':True,'targets':'all','publisher':'FSBL','category':'Productivity',
              'icon':['icons/32x32.png','icons/128x128.png','icons/128x128@2x.png','icons/icon.icns','icons/icon.ico']},
            'android':{'minSdkVersion':24}
          },indent=2))
          Path('src-tauri/Cargo.toml').write_text('''[package]
          name = \"projectflow\"
          version = \"4.1.0\"
          edition = \"2021\"
          [lib]
          name = \"projectflow_lib\"
          crate-type = [\"staticlib\",\"cdylib\",\"rlib\"]
          path = \"src/lib.rs\"
          [[bin]]
          name = \"projectflow\"
          path = \"src/main.rs\"
          [build-dependencies]
          tauri-build = { version = \"2\", features = [] }
          [dependencies]
          tauri = { version = \"2\", features = [] }
          tauri-plugin-notification = \"2\"
          tauri-plugin-http = \"2\"
          serde = { version = \"1\", features = [\"derive\"] }
          serde_json = \"1\"
          ''')
          Path('Cargo.toml').write_text('[workspace]\nmembers=[\"src-tauri\"]\nresolver=\"2\"\n')
          "
      - name: Generate icons
        run: pip install Pillow --quiet && python3 generate_icons.py
      - name: Patch URL
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          [ -n "$URL" ] && sed -i "s|https://web-production-bde95.up.railway.app|${URL}|g" src-tauri/src/lib.rs || true
      - name: Tauri Android init
        working-directory: src-tauri
        run: tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Build APK
        working-directory: src-tauri
        run: tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Build AAB
        working-directory: src-tauri
        run: tauri android build --aab
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

# ══════════════════════════════════════════════════════════════
#  iOS
# ══════════════════════════════════════════════════════════════
  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.5.0
      - name: Assemble src-tauri
        run: |
          python3 -c "
          import shutil, textwrap, json
          from pathlib import Path
          for d in ['src-tauri/src','src-tauri/capabilities','src-tauri/icons','dist']:
              Path(d).mkdir(parents=True, exist_ok=True)
          for s,d in {'lib.rs':'src-tauri/src/lib.rs','main.rs':'src-tauri/src/main.rs',
              'build.rs':'src-tauri/build.rs','default.json':'src-tauri/capabilities/default.json',
              'index.html':'dist/index.html'}.items():
              Path(s).exists() and shutil.copy(s,d)
          Path('src-tauri/tauri.conf.json').write_text(json.dumps({
            '\$schema':'https://schema.tauri.app/config/2','productName':'ProjectFlow',
            'version':'4.1.0','identifier':'com.projectflow.app',
            'build':{'frontendDist':'../dist'},
            'app':{'windows':[],'security':{'csp':None,'dangerousDisableAssetCspModification':True},'withGlobalTauri':True},
            'bundle':{'active':True,'targets':'all','publisher':'FSBL','category':'Productivity',
              'icon':['icons/32x32.png','icons/128x128.png','icons/128x128@2x.png','icons/icon.icns','icons/icon.ico']},
            'ios':{'minimumSystemVersion':'14.0'}
          },indent=2))
          Path('src-tauri/Cargo.toml').write_text('''[package]
          name = \"projectflow\"
          version = \"4.1.0\"
          edition = \"2021\"
          [lib]
          name = \"projectflow_lib\"
          crate-type = [\"staticlib\",\"cdylib\",\"rlib\"]
          path = \"src/lib.rs\"
          [[bin]]
          name = \"projectflow\"
          path = \"src/main.rs\"
          [build-dependencies]
          tauri-build = { version = \"2\", features = [] }
          [dependencies]
          tauri = { version = \"2\", features = [] }
          tauri-plugin-notification = \"2\"
          tauri-plugin-http = \"2\"
          serde = { version = \"1\", features = [\"derive\"] }
          serde_json = \"1\"
          ''')
          Path('Cargo.toml').write_text('[workspace]\nmembers=[\"src-tauri\"]\nresolver=\"2\"\n')
          "
      - name: Generate icons
        run: pip install Pillow --quiet && python3 generate_icons.py
      - name: Patch URL
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          [ -n "$URL" ] && sed -i "s|https://web-production-bde95.up.railway.app|${URL}|g" src-tauri/src/lib.rs || true
      - name: Tauri iOS init
        working-directory: src-tauri
        run: tauri ios init
      - name: Build iOS
        working-directory: src-tauri
        run: tauri ios build
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: warn

# ══════════════════════════════════════════════════════════════
#  RELEASE — combine all builds
# ══════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build-windows, build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.1.0
          name: "ProjectFlow v4.1.0"
          body: |
            ## ProjectFlow v4.1.0 — All Platforms

            | Platform | Download |
            |---|---|
            | Windows | `ProjectFlow_4.1.0_x64-setup.exe` |
            | Android | `app-release.apk` (direct install) or `.aab` (Play Store) |
            | iOS | `ProjectFlow.ipa` (App Store) |
          files: artifacts/**/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
